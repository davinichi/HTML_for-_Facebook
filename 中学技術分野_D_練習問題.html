function byId(id){return document.getElementById(id);}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}
function norm(s){return String(s||"").replace(/\s+/g,"").replace(/[（）()　]/g,"");}

function hideMsg(){byId("message").style.display="none";}

}
function getSelectedCategories(){

  return list;
}
function setSelectedCategories(list){
  var checks=document.querySelectorAll('input[name="cat"]');
  for(var i=0;i<checks.length;i++) checks[i].checked = list.indexOf(checks[i].value)>=0;
}
function calcQuotas(selected){
  var quotas={}, base=Math.floor(TOTAL_QUESTIONS/selected.length), rest=TOTAL_QUESTIONS%selected.length;
  var order=shuffle(selected);
  for(var i=0;i<selected.length;i++) quotas[selected[i]]=base;
  for(var r=0;r<rest;r++) quotas[order[r]]++;
  return quotas;
}
function makeTargetPositions(total){
  var base=Math.floor(total/4), rest=total%4, counts=[base,base,base,base], order=shuffle([0,1,2,3]);
  for(var i=0;i<rest;i++) counts[order[i]]++;
  var pos=[]; for(var p=0;p<4;p++){for(var n=0;n<counts[p];n++)pos.push(p);}
  return shuffle(pos);
}
function buildChoices(q, correctPos){
  var wrongs=shuffle(q.wrongs).slice(0,3), choices=["","","",""], wi=0;
  choices[correctPos]=q.answer;
  for(var i=0;i<4;i++){if(i!==correctPos) choices[i]=wrongs[wi++];}
  return choices;
}
function pickQuestions(selected){
  var quotas=calcQuotas(selected), selectedQs=[], usedIds={}, usedTexts={};
  for(var c=0;c<selected.length;c++){
    var cat=selected[c], need=quotas[cat], pool=shuffle(QUESTION_BANK.filter(function(q){return q.category===cat;})), count=0;
    for(var i=0;i<pool.length && count<need;i++){
      var q=pool[i], key=norm(q.sentence);
      if(usedIds[q.id]||usedTexts[key]) continue;
      usedIds[q.id]=true; usedTexts[key]=true; selectedQs.push(q); count++;
    }
    if(count<need){throw new Error(cat+"の問題数が不足しています。");}
  }
  return shuffle(selectedQs);
}
function startQuizWithCategories(cats){
  hideMsg();

    return {id:q.id,category:q.category,sentence:q.sentence,answer:q.answer,choices:buildChoices(q,cp),correctIndex:cp};

  renderQuiz();
}

  for(var k=0;k<labels.length;k++){
    labels[k].addEventListener("click",function(){
      var qi=this.getAttribute("data-q"), group=document.querySelectorAll('.choice[data-q="'+qi+'"]');
      for(var m=0;m<group.length;m++) group[m].classList.remove("selected");
      this.classList.add("selected");
    },false);
  }
  window.scrollTo(0,0);
}
function gradeQuiz(){
  var score=0, answered=0, catStats={}, answerPos=[0,0,0,0];
  for(var c=0;c<CATEGORIES.length;c++) catStats[CATEGORIES[c]]={ok:0,total:0};
  for(var i=0;i<currentQuestions.length;i++){
    var q=currentQuestions[i]; catStats[q.category].total++; answerPos[q.correctIndex]++;
    var checked=document.querySelector('input[name="q'+i+'"]:checked');
    var chosen=checked?parseInt(checked.value,10):-1; if(chosen>=0) answered++;
    var choices=document.querySelectorAll('.choice[data-q="'+i+'"]');
    for(var j=0;j<choices.length;j++){choices[j].classList.remove("correct","wrong"); if(j===q.correctIndex)choices[j].classList.add("correct"); if(chosen===j&&chosen!==q.correctIndex)choices[j].classList.add("wrong");}
    var fb=byId("fb"+i);
    if(chosen===q.correctIndex){score++;catStats[q.category].ok++;fb.className="feedback ok";fb.innerHTML="正解です。正解は <strong>"+LABELS[q.correctIndex]+". "+esc(q.answer)+"</strong> です。";}
    else{fb.className="feedback ng";fb.innerHTML="不正解です。正解は <strong>"+LABELS[q.correctIndex]+". "+esc(q.answer)+"</strong> です。";}
  }
  renderResult(score, answered, catStats, answerPos);
}
function renderResult(score, answered, catStats, answerPos){
  var weak=[], lowest=101;
  for(var c=0;c<CATEGORIES.length;c++){
    var st=catStats[CATEGORIES[c]];
    if(st.total>0){var rate=Math.round(st.ok/st.total*100); if(rate<lowest) lowest=rate;}
  }
  for(var c2=0;c2<CATEGORIES.length;c2++){
    var st2=catStats[CATEGORIES[c2]];
    if(st2.total>0){var rate2=Math.round(st2.ok/st2.total*100); if(rate2<80 && rate2===lowest) weak.push(CATEGORIES[c2]);}
  }
  if(weak.length===0){
    for(var c3=0;c3<CATEGORIES.length;c3++){
      var st3=catStats[CATEGORIES[c3]];
      if(st3.total>0 && Math.round(st3.ok/st3.total*100)===lowest) weak.push(CATEGORIES[c3]);
    }
  }
  var percent=Math.round(score/currentQuestions.length*100), html='<h2>採点結果</h2><div class="summaryGrid">';
  html+='<div class="summaryItem"><span>得点</span><strong>'+score+' / '+currentQuestions.length+'</strong></div>';
  html+='<div class="summaryItem"><span>正答率</span><strong>'+percent+'%</strong></div>';
  html+='<div class="summaryItem"><span>回答済み</span><strong>'+answered+'問</strong></div></div><hr><h3>分野別結果</h3><div class="summaryGrid">';
  for(var c4=0;c4<CATEGORIES.length;c4++){
    var name=CATEGORIES[c4], st4=catStats[name];
    if(st4.total>0){
      var r4=Math.round(st4.ok/st4.total*100), cls=weak.indexOf(name)>=0?' summaryItem weak':' summaryItem';
      html+='<div class="'+cls+'"><span>'+esc(name)+'</span><strong>'+st4.ok+' / '+st4.total+'</strong><div class="small">'+r4+'%</div></div>';
    }
  }
  html+='</div><hr><div class="small">正解位置：A '+answerPos[0]+'問 / B '+answerPos[1]+'問 / C '+answerPos[2]+'問 / D '+answerPos[3]+'問</div>';
  html+='<div class="warn"><strong>弱点分野：</strong>'+esc(weak.join("・"))+'<br>「弱点分野だけ再テスト」を押すと、この分野だけから25問を出題します。</div>';
  html+='<div class="controls"><button class="green" type="button" id="weakBtn">弱点分野だけ再テスト</button><button class="primary" type="button" id="sameBtn">同じ選択分野でもう一度</button><button class="secondary" type="button" id="selectBtn">分野選択へ戻る</button></div>';
  var result=byId("result"); result.innerHTML=html; result.style.display="block";
  byId("weakBtn").addEventListener("click",function(){setSelectedCategories(weak);startQuizWithCategories(weak);},false);
  byId("sameBtn").addEventListener("click",function(){startQuizWithCategories(lastSelectedCategories);},false);
  byId("selectBtn").addEventListener("click",function(){window.scrollTo(0,0);},false);
  result.scrollIntoView({behavior:"smooth",block:"start"});
}
renderCategoryBox();
byId("allBtn").addEventListener("click",function(){setSelectedCategories(CATEGORIES);},false);
byId("clearBtn").addEventListener("click",function(){setSelectedCategories([]);},false);
byId("startBtn").addEventListener("click",function(){startQuizWithCategories(getSelectedCategories());},false);
byId("gradeBtn").addEventListener("click",gradeQuiz,false);
byId("printBtn").addEventListener("click",function(){window.print();},false);
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){startQuizWithCategories(CATEGORIES);},false);}else{startQuizWithCategories(CATEGORIES);}
})();
</script>
</body>
</html>
